<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator Lombard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<div class="main">
<h2>Kalkulator</h2>

<div class="toolbar">
  <div class="left">
    <button onclick="openSearch()">Dodaj</button>
    <button onclick="accept()">Akceptuj</button>
  </div>

  <div class="right">
    <button onclick="resetCart()">Reset koszyk</button>
  </div>
</div>

<input id="searchBox" placeholder="Szukaj..." style="display:none;">
<div id="results"></div>

<input id="qtyBox" placeholder="Ilość" style="display:none;">

<table id="cart">
<tr>
<th>Produkt</th>
<th>Ilość</th>
<th>Cena</th>
<th>Suma</th>
<th></th>
</tr>
</table>

<div class="total">
    💰 Skup: <b><span id="buyTotal">0</span>$</b><br>
    💸 Lombard: <b><span id="sellTotal">0</span>$</b><br><br>

    💵 Cena transakcji:
    <input id="customPrice" placeholder="np. 500">
</div>

</div>

<div class="side">

<div class="side-header">
  <h2>Transakcje</h2>
  <button class="danger" onclick="endShift()">Zakończ zmianę</button>
</div>

<div id="historyList"></div>

</div>

</div>

<!-- ⚙️ SETTINGS -->
<div id="settingsBtn">⚙️</div>

<div class="modal" id="settingsModal">
  <div class="modal-box">
    <h3>Ustaw Discord ID</h3>
    <input id="discordIdInput" placeholder="np. 123456789012345678">
    <br><br>
    <button onclick="saveSettings()">Zapisz</button>
  </div>
</div>

<div class="modal" id="modal">
  <div id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
