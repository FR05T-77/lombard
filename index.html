<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator Lombard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<div class="main">
<h2>Kalkulator</h2>

<div class="toolbar">
  <div class="left">
    <button onclick="openSearch()">Dodaj</button>
    <button onclick="accept()">Akceptuj</button>
  </div>

  <div class="right">
    <button onclick="resetCart()">Reset koszyka</button>
  </div>
</div>

<input id="searchBox" placeholder="Szukaj..." style="display:none;">
<div id="results"></div>

<input id="qtyBox" placeholder="Ilość" style="display:none;">

<table id="cart">
<tr>
<th>Produkt</th>
<th>Ilość</th>
<th>Cena</th>
<th>Suma</th>
<th></th>
</tr>
</table>

<div class="total">
    <div>💰 Skup: <b><span id="buyTotal">0</span>$</b></div>
    <div>💸 Lombard: <b><span id="sellTotal">0</span>$</b></div>
    <div>
        💵 Cena:
        <input id="customPrice" placeholder="500">
    </div>
</div>

</div>

<div class="side">

<div class="side-header">
  <h2>Transakcje</h2>
  <div id="clock" style="display:none;">00:00:00</div>
  <button class="danger" onclick="endShift()">Zakończ zmianę</button>
</div>

<div id="historyList"></div>

</div>

</div>

<!-- ⚙️ SETTINGS -->
<div id="settingsBtn">⚙️</div>

<div class="modal" id="settingsModal">
  <div class="modal-box">
    <h3>Ustaw Discord ID</h3>
    <input id="discordIdInput">

    <br><br>

    <h3>Wybierz rangę</h3>
    <select id="roleSelect"></select>

    <br><br>
    <button onclick="saveSettings()">Zapisz</button>
  </div>
</div>

<!-- 🔥 MODAL STARTU ZMIANY -->
<div class="modal" id="startModal" style="display:flex;">
  <div class="modal-box">
    <h3>Rozpocznij zmianę</h3>

    <input id="startMoney" placeholder="Środki startowe">

    <br><br>

    <label>
      <input type="checkbox" id="ownMoney">
      Własne
    </label>

    <br><br>

    <button onclick="settingsModal.style.display='flex'">⚙️ Ustawienia</button>

    <br><br>

    <button onclick="startShift()">Rozpocznij zmianę</button>
  </div>
</div>

<div class="modal" id="modal">
  <div id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script src="webhooks.js"></script>
<script src="script.js"></script>

</body>
</html>
